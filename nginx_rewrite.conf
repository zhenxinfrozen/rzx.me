# =========================================================
# rzx-me 站点 Nginx 伪静态配置文件
# 用途：宝塔面板 -> 网站 -> 设置 -> 伪静态 -> 粘贴此内容
# =========================================================

location / {
    # 尝试按顺序查找：
    # 1. $uri (物理文件存在？)
    # 2. $uri/ (物理目录存在？)
    # 3. 都不存在 -> 转发给 /index.php
    try_files $uri $uri/ /index.php$is_args$args;
}

# 禁止访问敏感文件 (可选安全增强)
location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md) {
    return 404;
}