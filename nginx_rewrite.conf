# =========================================================
# rzx-me 站点 Nginx 伪静态配置文件
# 用途：宝塔面板 -> 网站 -> 设置 -> 伪静态 -> 粘贴此内容
# =========================================================

location / {
    # 1. 检测文件是否存在
    # !-e $request_filename 表示请求的文件或目录在磁盘上不存在
    if (!-e $request_filename){
        
        # 2. 路由重写
        # 将所有请求重写到 index.php
        # 参数解析:
        # ^(.*)$      : 捕获所有的 URL 路径部分
        # /index.php  : 转发给统一入口文件
        # ?route=/$1  : 将捕获的路径作为 route 参数传递给 PHP (适配 app/Router.php)
        # last        : 停止当前规则匹配，重新发起内部请求
        
        rewrite  ^(.*)$  /index.php?route=/$1  last;
        break;
    }
}

# 禁止访问敏感文件 (可选安全增强)
location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md) {
    return 404;
}
