<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Menu Blur Minimal Demo</title>
  <style>
    /* 最小样式：居中容器和图片尺寸 */
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;font-family:Arial,Helvetica,sans-serif}
    .ray-home-menu-hover-container{display:inline-block;cursor:pointer}
    .ray-home-menu-hover-container img{display:block;width:160px;height:auto;filter:url(#motion-blur-horizontal);transition:filter 0.35s ease}
    /* 可选 focus/active 可访问样式 */
    .ray-home-menu-hover-container:focus-within{outline:2px solid #44a}
  </style>
</head>
<body>

  <div class="ray-home-menu-hover-container" tabindex="0">
    <img id="menu-cion-blog-pictures" src="/../assets/images/ray-home-menu-pictures.png" alt="Demo Image">
  </div>

  <script>
    (function(){
      // 配置
      const START_X = 24; // 初始水平模糊强度
      const START_Y = 0;
      const DURATION = 200; // ms

      const img = document.getElementById('menu-cion-blog-pictures');
      if (!img) return; // 防守

      // 动态创建 SVG filter 并注入
      const svgns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgns, 'svg');
      svg.setAttribute('width','0'); svg.setAttribute('height','0'); svg.style.position='absolute';
      const defs = document.createElementNS(svgns,'defs');
      const filter = document.createElementNS(svgns,'filter');
      filter.setAttribute('id','motion-blur-horizontal');
      filter.setAttribute('x','-50%'); filter.setAttribute('y','-50%'); filter.setAttribute('width','200%'); filter.setAttribute('height','200%');
      const gblur = document.createElementNS(svgns,'feGaussianBlur');
      gblur.setAttribute('in','SourceGraphic'); gblur.setAttribute('stdDeviation', START_X + ' ' + START_Y);
      filter.appendChild(gblur); defs.appendChild(filter); svg.appendChild(defs); document.body.appendChild(svg);

      // 动画控制（简洁版）
      let raf = null, startTs = null, fromVal = START_X, toVal = 0;
      function ease(t){ return t<.5?2*t*t:-1+(4-2*t)*t; }
      function step(ts){
        if (!startTs) startTs = ts; const elapsed = ts - startTs; let p = Math.min(1, elapsed / DURATION); p = ease(p);
        const cur = fromVal + (toVal - fromVal) * p;
        gblur.setAttribute('stdDeviation', cur + ' ' + START_Y);
        if (elapsed < DURATION) raf = requestAnimationFrame(step); else { startTs=null; raf=null; }
      }

      function startAnim(f,t){ if (raf) cancelAnimationFrame(raf); fromVal = f; toVal = t; startTs=null; raf = requestAnimationFrame(step); }

      // 鼠标/键盘/触摸事件
      img.addEventListener('mouseenter', () => startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || START_X, 0));
      img.addEventListener('mouseleave', () => startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || 0, START_X));
      img.addEventListener('focus', () => startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || START_X, 0));
      img.addEventListener('blur', () => startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || 0, START_X));
      img.addEventListener('touchstart', (e) => { e.preventDefault(); startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || START_X, 0); }, {passive:false});
      img.addEventListener('touchend', () => startAnim(parseFloat(gblur.getAttribute('stdDeviation')) || 0, START_X));

      // 兼容性回退：如果浏览器不支持 URL filter 平滑（或性能差），你也可以改为：
      // img.style.filter = 'blur(12px)';
      // img.addEventListener('mouseenter', ()=> img.style.filter = 'blur(0)');
      // img.addEventListener('mouseleave', ()=> img.style.filter = 'blur(12px)');

    })();
  </script>

</body>
</html>
