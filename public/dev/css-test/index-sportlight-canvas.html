<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CSS Test - Ray Comic Showbox (Canvas Spotlight)</title>
    <style>
      html,body{height:100%;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f3f3f3}

      #ray-anim-wapper{
        display:flex;
        justify-content:center;
      }
      #ray-anim-showbox{
        display:inline-flex;
        margin:400px 0;
        position:relative;
        gap:10px;
        --item-width:200px;
        --gap:10px;
      }
      #ray-anim-showbox .anim-item{
        box-sizing:border-box;
        width:var(--item-width);
        height:363px;
        border:#444 solid 2px;
        background:#fff;
        overflow:hidden;
        flex:0 0 auto;
        box-shadow:0 6px 18px rgba(0,0,0,0.06);
        position:relative;
      }
      #ray-anim-showbox .anim-item img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
      }

      /* 遮罩层覆盖整个 showbox */
      #overlay{
        position:absolute;
        top:0;
        left:0;
        right:0;
        bottom:0;
        opacity:0;
        transition:opacity 0.4s ease;
        pointer-events:none;
        z-index:2;
      }
      
      #overlay canvas{
        width:100%;
        height:100%;
        display:block;
      }

      #anim-1:hover ~ #overlay,
      #anim-2:hover ~ #overlay,
      #anim-3:hover ~ #overlay,
      #anim-4:hover ~ #overlay{
        opacity:0.85;
      }

      @media(max-width:1200px){
        #ray-anim-showbox{width:calc(100% - 40px);gap:0}
        #ray-anim-showbox .anim-item{width:22%;height:560px}
      }
      @media(max-width:700px){
        #ray-anim-showbox{flex-wrap:wrap;gap:0}
        #ray-anim-showbox .anim-item{width:48%;height:320px}
      }
    </style>
  </head>
  <body>
    <div id="ray-anim-wapper">
      <div id="ray-anim-showbox" aria-label="Ray Comic Showbox">
        <div class="anim-item" id="anim-1" data-color="255,0,242">
          <img src="../../assets/images/anim-001.png" alt="comic 1">
        </div>
        <div class="anim-item" id="anim-2" data-color="0,166,255">
          <img src="../../assets/images/anim-002.png" alt="comic 2">
        </div>
        <div class="anim-item" id="anim-3" data-color="0,255,0">
          <img src="../../assets/images/anim-003.png" alt="comic 3">
        </div>
        <div class="anim-item" id="anim-4" data-color="255,255,0">
          <img src="../../assets/images/anim-004.png" alt="comic 4">
        </div>
        <div id="overlay">
          <canvas></canvas>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const showbox = document.getElementById('ray-anim-showbox');
        const overlay = document.getElementById('overlay');
        const canvas = overlay.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        const items = document.querySelectorAll('.anim-item');
        
        const config = {
          blurRadius: 5,
          spotRadius: 60,
          spotSoftness: 40,
          colorOpacity: 0.4
        };

        let currentItemIndex = -1;
        let currentColor = '26,35,126';
        let currentImg = null;
        let mousePos = { x: null, y: null };
        let rafId = null;
        const blurredCache = new Map();

        // 简化的 Box Blur
        function simpleBlur(imageData, radius) {
          const w = imageData.width;
          const h = imageData.height;
          const src = new Uint8ClampedArray(imageData.data);
          const dst = imageData.data;
          
          // 水平
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              let r = 0, g = 0, b = 0, a = 0, count = 0;
              
              for (let dx = -radius; dx <= radius; dx++) {
                const nx = Math.max(0, Math.min(w - 1, x + dx));
                const idx = (y * w + nx) * 4;
                r += src[idx];
                g += src[idx + 1];
                b += src[idx + 2];
                a += src[idx + 3];
                count++;
              }
              
              const idx = (y * w + x) * 4;
              dst[idx] = r / count;
              dst[idx + 1] = g / count;
              dst[idx + 2] = b / count;
              dst[idx + 3] = a / count;
            }
          }
          
          src.set(dst);
          
          // 垂直
          for (let x = 0; x < w; x++) {
            for (let y = 0; y < h; y++) {
              let r = 0, g = 0, b = 0, a = 0, count = 0;
              
              for (let dy = -radius; dy <= radius; dy++) {
                const ny = Math.max(0, Math.min(h - 1, y + dy));
                const idx = (ny * w + x) * 4;
                r += src[idx];
                g += src[idx + 1];
                b += src[idx + 2];
                a += src[idx + 3];
                count++;
              }
              
              const idx = (y * w + x) * 4;
              dst[idx] = r / count;
              dst[idx + 1] = g / count;
              dst[idx + 2] = b / count;
              dst[idx + 3] = a / count;
            }
          }
        }

        function render() {
          if (currentItemIndex < 0 || !currentImg || !currentImg.complete) return;
          
          const showboxRect = showbox.getBoundingClientRect();
          const overlayRect = overlay.getBoundingClientRect();
          
          if (overlayRect.width === 0 || overlayRect.height === 0) return;
          
          canvas.width = overlayRect.width;
          canvas.height = overlayRect.height;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          try {
            // 获取当前 item 的位置
            const item = items[currentItemIndex];
            const itemRect = item.getBoundingClientRect();
            
            // 计算 item 在 overlay 中的相对位置
            const offsetX = itemRect.left - overlayRect.left;
            const offsetY = itemRect.top - overlayRect.top;
            const itemWidth = itemRect.width;
            const itemHeight = itemRect.height;
            
            // 创建临时画布绘制单个 item
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = itemWidth;
            tempCanvas.height = itemHeight;
            
            // 绘制图片
            tempCtx.drawImage(currentImg, 0, 0, itemWidth, itemHeight);
            const imageData = tempCtx.getImageData(0, 0, itemWidth, itemHeight);
            
            // 应用模糊
            simpleBlur(imageData, config.blurRadius);
            
            // 应用彩色遮罩
            const pixels = imageData.data;
            const [r, g, b] = currentColor.split(',').map(Number);
            for (let i = 0; i < pixels.length; i += 4) {
              pixels[i] = pixels[i] * (1 - config.colorOpacity) + r * config.colorOpacity;
              pixels[i + 1] = pixels[i + 1] * (1 - config.colorOpacity) + g * config.colorOpacity;
              pixels[i + 2] = pixels[i + 2] * (1 - config.colorOpacity) + b * config.colorOpacity;
            }
            
            // 如果有鼠标位置，应用聚光灯效果
            if (mousePos.x !== null && mousePos.y !== null) {
              const localMouseX = mousePos.x - overlayRect.left - offsetX;
              const localMouseY = mousePos.y - overlayRect.top - offsetY;
              
              if (localMouseX >= 0 && localMouseX <= itemWidth && localMouseY >= 0 && localMouseY <= itemHeight) {
                // 获取清晰图像
                tempCtx.clearRect(0, 0, itemWidth, itemHeight);
                tempCtx.drawImage(currentImg, 0, 0, itemWidth, itemHeight);
                const clearData = tempCtx.getImageData(0, 0, itemWidth, itemHeight);
                const clearPixels = clearData.data;
                
                // 应用彩色遮罩到清晰图
                for (let i = 0; i < clearPixels.length; i += 4) {
                  clearPixels[i] = clearPixels[i] * (1 - config.colorOpacity) + r * config.colorOpacity;
                  clearPixels[i + 1] = clearPixels[i + 1] * (1 - config.colorOpacity) + g * config.colorOpacity;
                  clearPixels[i + 2] = clearPixels[i + 2] * (1 - config.colorOpacity) + b * config.colorOpacity;
                }
                
                // 混合模糊和清晰图像
                for (let y = 0; y < itemHeight; y++) {
                  for (let x = 0; x < itemWidth; x++) {
                    const dx = x - localMouseX;
                    const dy = y - localMouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    let clearness = 0;
                    if (dist < config.spotRadius) {
                      clearness = 1;
                    } else if (dist < config.spotRadius + config.spotSoftness) {
                      clearness = 1 - (dist - config.spotRadius) / config.spotSoftness;
                    }
                    
                    if (clearness > 0) {
                      const idx = (y * itemWidth + x) * 4;
                      pixels[idx] = pixels[idx] * (1 - clearness) + clearPixels[idx] * clearness;
                      pixels[idx + 1] = pixels[idx + 1] * (1 - clearness) + clearPixels[idx + 1] * clearness;
                      pixels[idx + 2] = pixels[idx + 2] * (1 - clearness) + clearPixels[idx + 2] * clearness;
                    }
                  }
                }
              }
            }
            
            tempCtx.putImageData(imageData, 0, 0);
            ctx.drawImage(tempCanvas, offsetX, offsetY);
            
          } catch (e) {
            console.error('Render error:', e);
          }
          
          rafId = null;
        }

        function scheduleRender() {
          if (!rafId) {
            rafId = requestAnimationFrame(render);
          }
        }

        items.forEach((item, index) => {
          const img = item.querySelector('img');
          
          item.addEventListener('mouseenter', () => {
            currentItemIndex = index;
            currentImg = img;
            currentColor = item.dataset.color;
            
            if (img.complete) {
              scheduleRender();
            } else {
              img.addEventListener('load', scheduleRender, { once: true });
            }
          });
        });

        showbox.addEventListener('mousemove', (e) => {
          mousePos.x = e.clientX;
          mousePos.y = e.clientY;
          if (currentImg) {
            scheduleRender();
          }
        });

        showbox.addEventListener('mouseleave', () => {
          mousePos.x = null;
          mousePos.y = null;
          currentItemIndex = -1;
          currentImg = null;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        window.addEventListener('resize', () => {
          blurredCache.clear();
          if (currentImg) {
            scheduleRender();
          }
        });
      })();
    </script>
  </body>
</html>
