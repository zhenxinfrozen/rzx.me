<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复后的漫画图标测试</title>
    <link rel="stylesheet" href="/assets/css/comic.css">
    <style>
        body {
            padding: 20px;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .section h3 {
            color: #333;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 style="text-align: center; color: #333;">修复后的漫画图标效果测试</h1>
        
        <div class="section">
            <h3>🎯 小图标区域 (60x60) - 应该有精美hover效果</h3>
            <div id="ray-comic-menu">
                <!-- 测试图标1：有default和hover图片 -->
                <div class="ray-comic-menu-icon">
                    <div class="default-img" style="background: linear-gradient(45deg, #ff6b6b, #ff8e8e); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 10px;">默认</div>
                    <div class="hover-img" style="background: linear-gradient(45deg, #4ecdc4, #6cc6cb); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 10px;">悬停</div>
                </div>
                
                <!-- 测试图标2：只有默认图片 -->
                <div class="ray-comic-menu-icon">
                    <div class="default-img" style="background: linear-gradient(45deg, #a8e6cf, #dcedc1); display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; font-size: 10px;">单图</div>
                </div>
                
                <!-- 测试图标3：文字图标 -->
                <div class="ray-comic-menu-icon">
                    <span class="icon-text">文字</span>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h3>🖼️ 大图显示区域 - 不应该有小图标的hover特效</h3>
            <div class="comic-item">
                <img src="https://via.placeholder.com/400x300/667eea/ffffff?text=漫画大图示例" alt="测试大图">
            </div>
        </div>
        
        <div class="section">
            <h3>✅ 修复内容总结：</h3>
            <ul style="line-height: 1.8;">
                <li><strong>尺寸修复：</strong>图标回到60x60，更精致</li>
                <li><strong>样式优化：</strong>增强hover效果，添加阴影和微动画</li>
                <li><strong>特效分离：</strong>小图标有hover特效，大图有独立的缩放效果</li>
                <li><strong>视觉层次：</strong>hover时图标有轻微上浮和放大效果</li>
            </ul>
        </div>
        
        <div style="text-align: center; color: #666; margin-top: 30px;">
            <p><strong>测试方法：</strong>鼠标悬停小图标应该有平滑的切换效果，悬停大图应该有轻微放大效果</p>
        </div>
    </div>
</body>
</html>
