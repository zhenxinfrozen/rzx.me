# 宝塔面板伪静态 - 最简版本
# 测试用 - 让所有请求都走PHP

# 静态文件直接访问
location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|pdf)$ {
    try_files $uri =404;
}

# 静态目录直接访问
location ^~ /assets/ {
    try_files $uri =404;
}

# 禁止访问敏感文件
location ~ /\. {
    deny all;
}

# 主路由 - 所有动态请求都走PHP
location / {
    try_files $uri $uri/ /index.php?$query_string;
}